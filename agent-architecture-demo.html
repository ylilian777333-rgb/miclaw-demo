<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MiClaw 内容助手 Agent Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F4F5F7;
  --card:#FFFFFF;
  --primary:#1B1B1F;
  --secondary:#72727A;
  --accent:#FF6A00;
  --accent-light:#FFF3EB;
  --green:#00B578;
  --green-light:#E8F8F0;
  --orange:#FF8C00;
  --red:#FA5151;
  --blue:#3478F6;
  --blue-light:#EBF2FF;
  --purple:#7C3AED;
  --purple-light:#F0EBFF;
  --glass:rgba(255,255,255,0.72);
  --glass-border:rgba(255,255,255,0.35);
  --glass-dark:rgba(0,0,0,0.03);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --radius-xs:8px;
  --radius-sm:12px;
  --radius-md:16px;
  --radius-lg:22px;
  --radius-xl:28px;
}
body{
  font-family:'Mi Sans','Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  background:linear-gradient(145deg,#0D0D12 0%,#1A1A2E 30%,#16213E 60%,#0F3460 100%);
  display:flex;justify-content:center;align-items:center;min-height:100vh;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
/* Ambient background orbs */
body::before,body::after{
  content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none;
}
body::before{width:500px;height:500px;background:var(--accent);top:-100px;right:-100px}
body::after{width:400px;height:400px;background:var(--blue);bottom:-80px;left:-80px}
</style>
<style>
/* Phone frame - HyperOS style */
.phone-frame{
  width:393px;height:852px;background:var(--bg);
  border-radius:48px;overflow:hidden;position:relative;
  box-shadow:
    inset 0 0 0 1.5px rgba(255,255,255,0.08),
    0 0 0 2px #2A2A3A,
    0 0 0 4px #1A1A2A,
    0 25px 80px rgba(0,0,0,0.6),
    0 5px 20px rgba(0,0,0,0.3);
}
/* Status bar */
.status-bar{
  height:54px;padding:14px 28px 0;
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;font-weight:600;color:var(--primary);
  position:relative;z-index:10;
}
.status-bar .notch{
  width:126px;height:34px;background:#000;
  border-radius:0 0 22px 22px;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
}
.status-icons{display:flex;gap:4px;align-items:center;font-size:11px;color:var(--secondary)}
/* Launcher screen */
.launcher-screen{position:absolute;top:0;left:0;right:0;bottom:0;z-index:50;display:none}
.launcher-wallpaper{
  width:100%;height:100%;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#E8D5A0 0%,#F2C46D 15%,#E8A84C 30%,#D4884A 45%,#C0A070 55%,#88B8A0 65%,#6CA898 75%,#E8C060 90%,#F0A830 100%);
}
/* Wallpaper warm floral blur blobs */
.launcher-wallpaper::before{
  content:'';position:absolute;width:350px;height:350px;
  background:radial-gradient(ellipse,rgba(240,168,48,0.7) 0%,rgba(232,160,76,0.4) 40%,transparent 70%);
  top:180px;right:-60px;pointer-events:none;filter:blur(40px);
}
.launcher-wallpaper::after{
  content:'';position:absolute;width:300px;height:300px;
  background:radial-gradient(ellipse,rgba(108,168,152,0.6) 0%,rgba(136,184,160,0.3) 40%,transparent 70%);
  bottom:150px;left:-30px;pointer-events:none;filter:blur(40px);
}
.launcher-status{
  height:54px;padding:14px 28px 0;
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;font-weight:600;color:rgba(0,0,0,0.7);
  position:relative;z-index:10;
}
.launcher-status .notch{
  width:126px;height:34px;background:#000;
  border-radius:0 0 22px 22px;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
}
.launcher-time{text-align:center;margin-top:24px;color:rgba(0,0,0,0.75)}
.launcher-time .time{font-size:68px;font-weight:200;letter-spacing:-3px;line-height:1}
.launcher-time .date{font-size:14px;opacity:0.5;margin-top:8px;font-weight:400;letter-spacing:0.5px}
</style>
<style>
/* HyperOS Launcher Card - frosted glass */
.launcher-card{
  margin:20px 16px;border-radius:var(--radius-xl);
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:none;
  overflow:hidden;animation:cardSlideUp 0.6s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 4px 24px rgba(0,0,0,0.08);
}
.launcher-card-header{
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.launcher-card-header .lc-icon{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent) 0%,#FF8C00 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;box-shadow:0 2px 8px rgba(255,106,0,0.3);
}
.launcher-card-header .lc-title{font-size:14px;font-weight:600;color:var(--primary);letter-spacing:0.2px}
.launcher-card-header .lc-sub{font-size:11px;color:var(--secondary);margin-top:1px}
.launcher-card-body{padding:10px 14px 14px}
.launcher-card-item{
  padding:12px 14px;border-radius:var(--radius-md);
  background:rgba(255,255,255,0.5);margin-bottom:8px;
  cursor:pointer;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
  border:none;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.launcher-card-item:hover{background:rgba(255,255,255,0.7);transform:scale(1.01)}
.launcher-card-item:active{transform:scale(0.98)}
.launcher-card-item:last-child{margin-bottom:0}
.launcher-card-item .lci-title{font-size:13px;font-weight:600;color:var(--primary)}
.launcher-card-item .lci-desc{font-size:11px;color:var(--secondary);margin-top:3px;line-height:1.4}
.launcher-card-item .lci-tag{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:600;margin-top:6px;letter-spacing:0.3px;
}
/* Dock icons */
.launcher-dock{
  position:absolute;bottom:28px;left:0;right:0;
  display:flex;justify-content:center;gap:20px;
  padding:0 32px;
}
.dock-icon{
  width:52px;height:52px;border-radius:14px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:transform 0.2s;
  border:1px solid rgba(255,255,255,0.5);
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.dock-icon:active{transform:scale(0.9)}
</style>
<style>
/* Notification banner - HyperOS glass style */
.notif-banner{
  position:absolute;top:60px;left:10px;right:10px;z-index:60;
  border-radius:var(--radius-lg);
  background:rgba(30,30,46,0.88);
  backdrop-filter:blur(30px) saturate(150%);
  -webkit-backdrop-filter:blur(30px) saturate(150%);
  padding:14px 16px;display:none;
  align-items:center;gap:12px;
  animation:notifDrop 0.5s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}
.notif-banner .nb-icon{
  width:38px;height:38px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.notif-banner .nb-text{flex:1}
.notif-banner .nb-text .nb-app{font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.notif-banner .nb-text .nb-title{font-size:14px;color:white;font-weight:600;margin-top:2px}
.notif-banner .nb-text .nb-body{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;line-height:1.3}
/* MiClaw Chat UI - HyperOS style */
.nav-bar{
  height:52px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border-bottom:0.5px solid rgba(0,0,0,0.06);
}
.nav-bar .logo{
  font-size:18px;font-weight:700;color:var(--primary);
  display:flex;align-items:center;gap:10px;letter-spacing:-0.3px;
}
.nav-bar .logo .dot{
  width:7px;height:7px;background:var(--green);border-radius:50%;
  box-shadow:0 0 6px rgba(0,181,120,0.4);
}
.chat-area{
  height:calc(852px - 54px - 52px - 76px);
  overflow-y:auto;padding:16px 14px;scroll-behavior:smooth;
  background:var(--bg);
}
.chat-area::-webkit-scrollbar{display:none}
</style>
<style>
/* Messages */
.message{display:flex;margin-bottom:14px;animation:msgFade 0.4s cubic-bezier(0.16,1,0.3,1)}
.message.user{justify-content:flex-end}
.avatar{
  width:30px;height:30px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#FF8C00);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:white;flex-shrink:0;
  margin-right:8px;margin-top:2px;font-weight:700;
  box-shadow:0 2px 8px rgba(255,106,0,0.25);
}
.message.user .avatar{display:none}
.bubble{
  max-width:275px;padding:11px 15px;
  border-radius:var(--radius-lg);font-size:14px;line-height:1.55;word-break:break-word;
}
.message.user .bubble{
  background:linear-gradient(135deg,var(--accent),#FF8C00);
  color:white;border-bottom-right-radius:6px;
  box-shadow:0 2px 12px rgba(255,106,0,0.2);
}
.message.ai .bubble{
  background:var(--card);color:var(--primary);
  border-bottom-left-radius:6px;
  box-shadow:var(--shadow-sm);border:0.5px solid rgba(0,0,0,0.04);
}
/* Thinking indicator */
.thinking{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;font-size:13px;color:var(--secondary);
}
.thinking .spinner{
  width:16px;height:16px;border:2px solid rgba(0,0,0,0.08);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.7s linear infinite;
}
.thinking-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 12px;background:var(--accent-light);color:var(--accent);
  border-radius:20px;font-size:11px;font-weight:600;margin-bottom:6px;
  letter-spacing:0.2px;
}
/* Tool cards */
.tool-card{
  background:var(--card);border-radius:var(--radius-md);padding:12px 14px;
  margin-top:6px;border:0.5px solid rgba(0,0,0,0.05);
  box-shadow:var(--shadow-sm);
}
.tool-card .tool-header{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--secondary);margin-bottom:8px;
  font-weight:500;letter-spacing:0.2px;
}
.tool-card .tool-icon{
  width:22px;height:22px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:11px;
}
.tool-card .tool-content{font-size:13px;color:var(--primary);line-height:1.6}
</style>
<style>
/* Action buttons - HyperOS pill style */
.action-btn{
  padding:7px 14px;border-radius:20px;font-size:12px;
  font-weight:600;border:none;cursor:pointer;white-space:nowrap;
  transition:all 0.2s cubic-bezier(0.16,1,0.3,1);letter-spacing:0.2px;
}
.action-btn.primary{background:var(--accent);color:white;box-shadow:0 2px 8px rgba(255,106,0,0.25)}
.action-btn.secondary{background:var(--bg);color:var(--primary);border:0.5px solid rgba(0,0,0,0.06)}
.action-btn:active{transform:scale(0.95)}
/* Summary / Rich cards */
.summary-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;margin-top:8px;box-shadow:var(--shadow-md);border:0.5px solid rgba(0,0,0,0.04)}
.summary-card .header{padding:14px 16px;background:linear-gradient(135deg,var(--accent),#FF8C00);color:white;font-size:14px;font-weight:600}
.summary-card .body{padding:14px 16px;font-size:13px;line-height:1.7;color:var(--primary)}
.summary-card .body .section-title{font-weight:600;font-size:12px;margin:10px 0 4px;color:var(--accent);letter-spacing:0.3px;text-transform:uppercase}
.summary-card .body .section-title:first-child{margin-top:0}
.confirm-bar{display:flex;gap:8px;margin-top:12px;padding:12px 0 0;border-top:0.5px solid rgba(0,0,0,0.06);flex-wrap:nowrap}
/* Translate card */
.translate-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;margin-top:8px;box-shadow:var(--shadow-md);border:0.5px solid rgba(0,0,0,0.04)}
.translate-card .original{padding:14px 16px;background:rgba(0,0,0,0.02);font-size:13px;color:var(--secondary);line-height:1.6;border-bottom:0.5px solid rgba(0,0,0,0.05)}
.translate-card .translated{padding:14px 16px;font-size:13px;color:var(--primary);line-height:1.6}
.translate-card .lang-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:6px;letter-spacing:0.3px}
/* Create card */
.create-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;margin-top:8px;box-shadow:var(--shadow-md);border:0.5px solid rgba(0,0,0,0.04)}
.create-card .header{padding:14px 16px;background:linear-gradient(135deg,var(--purple),#A855F7);color:white;font-size:14px;font-weight:600}
.create-card .body{padding:14px 16px;font-size:13px;line-height:1.7;color:var(--primary)}
/* Report card */
.report-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;margin-top:8px;box-shadow:var(--shadow-md);border:0.5px solid rgba(0,0,0,0.04)}
.report-card .header{padding:14px 16px;background:linear-gradient(135deg,#00B578,#38EF7D);color:white;font-size:14px;font-weight:600}
.report-card .body{padding:14px 16px;font-size:13px;line-height:1.7;color:var(--primary)}
.report-card .stat-row{display:flex;gap:10px;margin:10px 0}
.report-card .stat{flex:1;text-align:center;padding:10px 8px;background:var(--bg);border-radius:var(--radius-sm)}
.report-card .stat .num{font-size:22px;font-weight:700;color:var(--accent)}
.report-card .stat .label{font-size:10px;color:var(--secondary);margin-top:3px;font-weight:500}
</style>
<style>
/* Clipboard toast - HyperOS notification style */
.clipboard-toast{
  position:absolute;top:110px;left:14px;right:14px;
  background:var(--card);border-radius:var(--radius-lg);
  padding:14px 16px;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:12px;
  animation:notifDrop 0.5s cubic-bezier(0.16,1,0.3,1);
  z-index:20;border:0.5px solid rgba(0,0,0,0.04);
}
.clipboard-toast .icon{
  width:38px;height:38px;border-radius:11px;
  background:var(--purple-light);display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.clipboard-toast .text{flex:1}
.clipboard-toast .text .title{font-size:13px;font-weight:600;color:var(--primary)}
.clipboard-toast .text .desc{font-size:11px;color:var(--secondary);margin-top:2px}
.clipboard-toast .actions button{
  padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;
  border:none;cursor:pointer;margin-left:4px;transition:all 0.2s;
}
/* Share sheet - HyperOS bottom sheet */
.share-sheet{position:absolute;bottom:0;left:0;right:0;z-index:55;display:none}
.share-sheet-bg{position:absolute;top:-852px;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35)}
.share-sheet-panel{
  background:var(--card);border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  padding:8px 16px 44px;position:relative;
  box-shadow:0 -8px 40px rgba(0,0,0,0.1);
}
.share-sheet-panel::before{
  content:'';display:block;width:36px;height:4px;
  background:rgba(0,0,0,0.1);border-radius:2px;
  margin:0 auto 16px;
}
.share-sheet-panel .ss-title{font-size:13px;color:var(--secondary);text-align:center;margin-bottom:20px;font-weight:500}
.share-sheet-panel .ss-apps{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.share-sheet-panel .ss-app{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.share-sheet-panel .ss-app .ss-icon{
  width:56px;height:56px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  transition:transform 0.2s;
}
.share-sheet-panel .ss-app .ss-icon:active{transform:scale(0.9)}
.share-sheet-panel .ss-app .ss-label{font-size:11px;color:var(--primary);font-weight:500}
.share-sheet-panel .ss-app.highlight .ss-icon{
  box-shadow:0 0 0 2.5px var(--accent),0 4px 12px rgba(255,106,0,0.2);
  animation:glowPulse 2s ease-in-out infinite;
}
/* Input area */
.input-area{
  height:76px;padding:10px 16px;
  background:var(--card);border-top:0.5px solid rgba(0,0,0,0.05);
  display:flex;align-items:center;gap:10px;
  position:absolute;bottom:0;left:0;right:0;
}
.input-field{
  flex:1;height:38px;border-radius:20px;
  background:var(--bg);border:none;padding:0 16px;
  font-size:14px;outline:none;color:var(--primary);
  font-family:inherit;
}
.input-field::placeholder{color:#B0B0B8}
.send-btn{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#FF8C00);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(255,106,0,0.3);transition:all 0.2s;
}
.send-btn:active{transform:scale(0.88)}
.send-btn svg{width:16px;height:16px}
</style>
<style>
/* Scene selector - HyperOS glass panel */
.scene-selector{
  position:fixed;top:20px;right:20px;bottom:20px;
  display:flex;flex-direction:column;gap:6px;z-index:100;
  background:rgba(20,20,35,0.6);
  backdrop-filter:blur(30px) saturate(150%);
  -webkit-backdrop-filter:blur(30px) saturate(150%);
  border-radius:var(--radius-xl);padding:20px 16px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 16px 48px rgba(0,0,0,0.3);
  min-width:240px;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.15) transparent;
}
.scene-selector::-webkit-scrollbar{width:4px}
.scene-selector::-webkit-scrollbar-track{background:transparent}
.scene-selector::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.scene-selector-title{
  color:white;font-size:15px;font-weight:700;
  margin-bottom:2px;letter-spacing:-0.3px;
  display:flex;align-items:center;gap:8px;
}
.scene-selector-sub{
  color:rgba(255,255,255,0.35);font-size:11px;
  margin-bottom:12px;font-weight:400;letter-spacing:0.3px;
}
.scene-btn{
  padding:10px 14px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.75);
  border:1px solid rgba(255,255,255,0.06);
  font-size:13px;cursor:pointer;text-align:left;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
  font-family:inherit;font-weight:500;
}
.scene-btn:hover{background:rgba(255,255,255,0.08);color:white}
.scene-btn.active{
  background:linear-gradient(135deg,rgba(255,106,0,0.15),rgba(255,140,0,0.1));
  color:white;border-color:rgba(255,106,0,0.3);
  box-shadow:0 0 16px rgba(255,106,0,0.1);
}
.scene-label{
  color:rgba(255,255,255,0.3);font-size:9px;padding:8px 0 4px;
  letter-spacing:1.5px;text-transform:uppercase;font-weight:600;
}
/* Animations */
@keyframes msgFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes notifDrop{from{opacity:0;transform:translateY(-30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 2.5px var(--accent),0 4px 12px rgba(255,106,0,0.15)}50%{box-shadow:0 0 0 2.5px var(--accent),0 4px 20px rgba(255,106,0,0.35)}}
@keyframes wave1{0%,100%{height:6px}50%{height:16px}}
@keyframes wave2{0%,100%{height:14px}50%{height:4px}}

<script>
function loadScene(s,btn){
  if(isPlaying)return;
  chatArea.innerHTML='';
  noteDetail.style.display='none';noteDetail.classList.remove('closing');
  document.getElementById('notifBanner').style.display='none';
  document.getElementById('notifBanner').style.cssText='position:absolute;top:60px;left:10px;right:10px;z-index:60;border-radius:var(--radius-lg);background:rgba(30,30,46,0.88);backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);padding:14px 16px;display:none;align-items:center;gap:12px;box-shadow:0 12px 40px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);cursor:pointer';
  document.getElementById('shareSheet').style.display='none';
  var t=document.getElementById('clipToast');if(t)t.remove();
  var ab=document.getElementById('agentBanner');if(ab)ab.remove();
  var sg=document.getElementById('screenshotGuide');if(sg)sg.remove();
  document.querySelectorAll('.scene-btn').forEach(function(b){b.classList.remove('active')});
  if(btn)btn.classList.add('active');
  switch(s){
    case 'launcher':sceneLauncher();break;
    case 'recording':sceneRecording();break;
    case 'share':sceneShare();break;
    case 'create':sceneCreate();break;
    case 'translate':sceneTranslate();break;
    case 'weekly':sceneWeekly();break;
    case 'ocr':sceneOcr();break;
    case 'meeting':sceneMeeting();break;
    case 'exam':sceneExam();break;
    case 'search':sceneSearch();break;
    case 'merge':sceneMerge();break;
    case 'video':sceneVideo();break;
    case 'watch':sceneWatch();break;
    case 'screenshot':sceneScreenshot();break;
    case 'smartclip':sceneSmartClip();break;
    case 'dailybrief':sceneDailyBrief();break;
    case 'island':sceneIsland();break;
    case 'widget':sceneWidget();break;
    case 'aikey_record':sceneAikeyRecord();break;
    case 'aikey_query':sceneAikeyQuery();break;
    case 'aikey_fuzzy':sceneAikeyFuzzy();break;
    case 'watch_multi':sceneWatchMulti();break;
    case 'lockscreen':sceneLockscreen();break;
    case 'ring':sceneRing();break;
    default:sceneLauncher();
  }
}
function sendMessage(){
  var t=inputField.value.trim();if(!t||isPlaying)return;inputField.value='';
  addMsg('user',t).then(function(){isPlaying=true;addThink('思考中...',200).then(function(){setTimeout(function(){rmThink();addMsg('ai','点击右侧场景按钮查看完整演示 😊');isPlaying=false},500)})});
}
window.onload=function(){setTimeout(function(){loadScene('recording',document.querySelector('.scene-btn'))},200)};
</script>
